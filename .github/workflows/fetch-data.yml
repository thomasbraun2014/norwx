name: Fetch Weather Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure DNS (Cloudflare as primary)
        run: |
          sudo bash -c 'echo "nameserver 1.1.1.1" > /etc/resolv.conf'
          sudo bash -c 'echo "nameserver 8.8.8.8" >> /etc/resolv.conf'

      - name: Verify DNS resolution
        run: |
          nslookup api.met.no 1.1.1.1 || echo "Warning: api.met.no DNS failed"
          nslookup services.swpc.noaa.gov || echo "Warning: NOAA DNS failed"

      - name: Fetch weather data
        run: node scripts/fetch-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update weather data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
